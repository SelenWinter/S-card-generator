<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Card-Generator</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        .control-panel {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .group-title {
            font-weight: bold;
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
            border-left: 3px solid #e0a800;
            padding-left: 6px;
        }

        .inline-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .inline-controls label {
            font-size: 11px;
            color: #666;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        input.small-input { width: 55px; padding: 4px; text-align: center; }
        select.small-select { width: 75px; padding: 4px; }
        input.color-input { width: 35px; height: 26px; padding: 0; border: none; cursor: pointer; }
        input[type="range"] { flex: 1; height: 4px; }

        textarea { height: 65px; resize: vertical; margin-top: 5px; }

        /* 保存ボタンエリア */
        .download-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .download-btn {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        #btn-hd { background-color: #6c757d; }
        #btn-lite { background-color: #28a745; }
        #btn-back { background-color: #007bff; }
        #btn-hd:hover { background-color: #5a6268; }
        #btn-lite:hover { background-color: #218838; }
        #btn-back:hover { background-color: #0056b3; }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            min-width: 360px;
        }

        .preview-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .preview-label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
            background: #e9ecef;
            padding: 2px 10px;
            border-radius: 12px;
        }

        /* カード本体 */
        #card {
            width: 350px;
            height: 490px;
            border: 12px solid rgba(51, 51, 51, 1);
            box-sizing: border-box;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0;
            justify-content: flex-start;
        }

        /* 背景画像レイヤー */
        #cardBg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            opacity: 1;
            z-index: 1;
            box-sizing: border-box;
        }

        /* 文字レイヤーコンテナ */
        .card-content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        /* 各区画スタイル */
        .section {
            padding: 0 12px;
            width: 100%;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-shadow: 1px 1px 1px #fff, -1px -1px 1px #fff, 1px -1px 1px #fff, -1px 1px 1px #fff;
            font-size: 18px;
            color: #000000;
            text-align: left;
            transition: font-size 0.1s;
        }

        /* 【改良】短く中央寄せにした区画ライン */
        .divider {
            width: 90%;
            margin: 5px auto;
            height: 2px;
            background-color: #333;
            flex-shrink: 0;
        }

        #section1 { padding-top: 6px; }

        /* カード裏面プレビュー用 */
        #cardBackPreview {
            width: 350px;
            height: 490px;
            border: 1px dashed #ccc;
            box-sizing: border-box;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
            position: relative;
        }

        #cardBackImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .back-placeholder {
            color: #777;
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }

        /* フッターサイン */
        footer {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 15px;
            width: 100%;
            max-width: 1100px;
        }
    </style>
</head>
<body>

    <h2 style="margin: 0 0 15px 0; color: #333; font-size: 22px;">S Card Generator</h2>

    <div class="container">
        <div class="control-panel">
            
            <div class="control-group">
                <div class="group-title">全体設定（配置・軽量化）</div>
                <div class="inline-controls">
                    <label>枠色:<input type="color" id="borderColor" class="color-input" value="#333333"></label>
                    <label>枠不透明度:<input type="range" id="borderOpacity" min="0" max="100" value="100" style="width:70px; flex:none;"></label>
                    <label>枠太さ:<input type="number" id="borderWidth" class="small-input" value="12" min="0">px</label>
                </div>
                <div class="inline-controls" style="margin-top: 5px;">
                    <label>縦配置:
                        <select id="valignSelect" class="small-select" style="width: 90px;">
                            <option value="flex-start" selected>上詰め</option>
                            <option value="space-between">均等配置</option>
                        </select>
                    </label>
                    <label style="font-size:11px; cursor:pointer; margin-left:5px;">
                        <input type="checkbox" id="borderModeToggle" style="margin-right:3px;">枠線に合わせて画像を縮小
                    </label>
                </div>
                <div class="inline-controls" style="margin-top: 10px;">
                    <select id="bgSelect" style="flex: 1;">
                        <option value="">背景なし（白）</option>
                        <option value="bg01.png">サンプル画像01</option>
                        <option value="bg02.png">サンプル画像02</option>
                        <option value="bg03.png">サンプル画像03</option>
                        <option value="bg04.png">サンプル画像04</option>
                        <option value="bg05.png">サンプル画像05</option>
                        <option value="upload">PCから画像をアップロード</option>
                    </select>
                    <label style="flex: 1; min-width: 120px;">背景の濃さ:
                        <input type="range" id="bgOpacity" min="0" max="100" value="100">
                    </label>
                </div>
                <input type="file" id="imageUpload" accept="image/*" style="display:none; margin-top:5px;">
            </div>

            <div class="control-group">
                <div class="group-title">【区画１】最上部</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" id="size1" class="size-input small-input" data-target="section1" value="22">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section1" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section1">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text1" placeholder="文字列１">カードのタイトルなど</textarea>
            </div>

            <div class="control-group">
                <div class="group-title">【区画２】中央</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" id="size2" class="size-input small-input" data-target="section2" value="16">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section2" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section2">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text2" placeholder="文字列２">メインの説明文。文字をたくさん入力してカードの下部からはみ出しそうになると、自動的に文字サイズが縮小されて枠内に収まります。</textarea>
            </div>

            <div class="control-group">
                <div class="group-title">【区画３】最下部</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" id="size3" class="size-input small-input" data-target="section3" value="14">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section3" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section3">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text3" placeholder="文字列３">フレーバーテキストや注釈など</textarea>
            </div>

            <div class="control-group">
                <div class="group-title">カード裏面設定</div>
                <input type="file" id="backImageUpload" accept="image/*">
                <div class="download-container" style="margin-top: 8px;">
                    <button class="download-btn" id="btn-back" disabled style="opacity: 0.6; cursor: not-allowed;">裏面画像を保存</button>
                </div>
            </div>

            <div class="download-container" style="border-top: 2px dashed #ddd; padding-top: 10px;">
                <button class="download-btn" id="btn-hd">標準保存 (表面)</button>
                <button class="download-btn" id="btn-lite">軽量保存 (表面)</button>
            </div>
        </div>

        <div class="preview-area">
            <div class="preview-block">
                <span class="preview-label">表面プレビュー</span>
                <div id="card">
                    <img id="cardBg" src="" alt="背景" crossorigin="anonymous">
                    <div class="card-content-container" id="cardContent">
                        <div id="section1" class="section" style="font-size: 22px;">カードのタイトルなど</div>
                        <div class="divider"></div>
                        <div id="section2" class="section" style="font-size: 16px;">メインの説明文。文字をたくさん入力してカードの下部からはみ出しそうになると、自動的に文字サイズが縮小されて枠内に収まります。</div>
                        <div class="divider"></div>
                        <div id="section3" class="section" style="font-size: 14px;">フレーバーテキストや注釈など</div>
                    </div>
                </div>
            </div>

            <div class="preview-block">
                <span class="preview-label">裏面プレビュー</span>
                <div id="cardBackPreview">
                    <div class="back-placeholder" id="backPlaceholder">左メニューの「カード裏面設定」から<br>裏面用ファイルをアップロードしてください</div>
                    <img id="cardBackImg" src="" alt="カード裏面">
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div>S-Card-Generator レーベル</div>
        <div style="margin-top: 4px;">作成日: 2026年6月25日</div>
        <div style="margin-top: 8px; font-style: italic; color: #aaa;">Designed &amp; Co-developed by Gemini AI</div>
    </footer>

    <script>
        const card = document.getElementById('card');
        const cardBg = document.getElementById('cardBg');
        const cardContent = document.getElementById('cardContent');

        // HEXカラーをRGBAに変換するヘルパー関数
        function updateBorder() {
            const hex = document.getElementById('borderColor').value;
            const opacity = document.getElementById('borderOpacity').value / 100;
            const width = parseInt(document.getElementById('borderWidth').value) || 0;
            
            // HEXからRGB成分を分解
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            
            card.style.borderColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
            card.style.borderWidth = width + 'px';

            // 【画像縮小モード切替ロジック】
            const shrinkMode = document.getElementById('borderModeToggle').checked;
            if (shrinkMode) {
                // 枠線の内側にピッタリ画像を収める
                cardBg.style.top = '0px';
                cardBg.style.left = '0px';
                cardBg.style.width = `calc(100% + ${width * 2}px)`;
                cardBg.style.height = `calc(100% + ${width * 2}px)`;
                cardBg.style.transform = `translate(-${width}px, -${width}px)`;
            } else {
                // 枠線を画像の上に被せる（デフォルト）
                cardBg.style.top = '0';
                cardBg.style.left = '0';
                cardBg.style.width = '100%';
                cardBg.style.height = '100%';
                cardBg.style.transform = 'none';
            }
        }

        // 自動文字縮小システム
        function autoShrink() {
            resetSizes();

            const borderWidth = parseInt(document.getElementById('borderWidth').value);
            const actualBorder = isNaN(borderWidth) ? 0 : borderWidth;
            const maxHeight = 490 - (actualBorder * 2);
            
            let currentHeight = cardContent.scrollHeight;
            
            let s1 = parseInt(document.getElementById('size1').value) || 22;
            let s2 = parseInt(document.getElementById('size2').value) || 16;
            let s3 = parseInt(document.getElementById('size3').value) || 14;

            while (currentHeight > maxHeight && (s1 > 8 || s2 > 8 || s3 > 8)) {
                if(s1 > 8) s1--;
                if(s2 > 8) s2--;
                if(s3 > 8) s3--;
                
                document.getElementById('section1').style.fontSize = s1 + 'px';
                document.getElementById('section2').style.fontSize = s2 + 'px';
                document.getElementById('section3').style.fontSize = s3 + 'px';
                
                currentHeight = cardContent.scrollHeight;
            }
        }

        function resetSizes() {
            document.getElementById('section1').style.fontSize = (document.getElementById('size1').value || 22) + 'px';
            document.getElementById('section2').style.fontSize = (document.getElementById('size2').value || 16) + 'px';
            document.getElementById('section3').style.fontSize = (document.getElementById('size3').value || 14) + 'px';
        }

        ['text1', 'text2', 'text3'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const targetId = id.replace('text', 'section');
                document.getElementById(targetId).textContent = e.target.value;
                autoShrink();
            });
        });

        document.querySelectorAll('.size-input').forEach(input => {
            input.addEventListener('input', () => { autoShrink(); });
        });

        // 枠の太さ・色・透明度の連動
        document.getElementById('borderWidth').addEventListener('input', () => {
            updateBorder();
            autoShrink(); 
        });
        document.getElementById('borderColor').addEventListener('input', (e) => {
            updateBorder();
            document.querySelectorAll('.divider').forEach(div => { div.style.backgroundColor = e.target.value; });
        });
        document.getElementById('borderOpacity').addEventListener('input', () => {
            updateBorder();
        });
        document.getElementById('borderModeToggle').addEventListener('change', () => {
            updateBorder();
        });

        document.getElementById('valignSelect').addEventListener('change', (e) => {
            cardContent.style.justifyContent = e.target.value;
            autoShrink();
        });

        document.getElementById('bgOpacity').addEventListener('input', (e) => {
            cardBg.style.opacity = e.target.value / 100;
        });

        document.querySelectorAll('.color-picker').forEach(picker => {
            picker.addEventListener('input', (e) => {
                document.getElementById(e.target.getAttribute('data-target')).style.color = e.target.value;
            });
        });

        document.querySelectorAll('.align-select').forEach(select => {
            select.addEventListener('change', (e) => {
                document.getElementById(e.target.getAttribute('data-target')).style.textAlign = e.target.value;
            });
        });

        // 背景画像切り替え処理
        const bgSelect = document.getElementById('bgSelect');
        const imageUpload = document.getElementById('imageUpload');
        
        bgSelect.addEventListener('change', (e) => {
            if (e.target.value === 'upload') {
                imageUpload.style.display = 'block';
            } else {
                imageUpload.style.display = 'none';
                if (e.target.value) {
                    cardBg.src = e.target.value + '?t=' + new Date().getTime();
                    cardBg.style.display = 'block';
                } else {
                    cardBg.src = '';
                    cardBg.style.display = 'none';
                }
            }
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    cardBg.src = ev.target.result; 
                    cardBg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // カード裏面読み込み処理
        const backImageUpload = document.getElementById('backImageUpload');
        const cardBackImg = document.getElementById('cardBackImg');
        const backPlaceholder = document.getElementById('backPlaceholder');
        const btnBack = document.getElementById('btn-back');

        backImageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    cardBackImg.src = ev.target.result;
                    cardBackImg.style.display = 'block';
                    backPlaceholder.style.display = 'none';
                    
                    // アップロードされたらダウンロードボタンを有効化
                    btnBack.disabled = false;
                    btnBack.style.opacity = '1';
                    btnBack.style.cursor = 'pointer';
                };
                reader.readAsDataURL(file);
            }
        });

        // 保存システム
        function saveCard(targetElement, scaleValue, filename) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "作成中...";
            btn.disabled = true;

            html2canvas(targetElement, { 
                useCORS: true, 
                scale: scaleValue,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }

        document.getElementById('btn-hd').addEventListener('click', (e) => saveCard(card, 1, 'card-standard.png'));
        document.getElementById('btn-lite').addEventListener('click', (e) => saveCard(card, 0.8, 'card-lite.png'));
        document.getElementById('btn-back').addEventListener('click', (e) => saveCard(document.getElementById('cardBackPreview'), 1, 'card-back.png'));
    </script>
</body>
</html>
