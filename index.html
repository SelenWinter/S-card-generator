<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高機能カードジェネレーター</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        /* 操作パネル（全体をコンパクトに調整） */
        .control-panel {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 各区画の設定エリアをコンパクトにするための横並びスタイル */
        .control-group {
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .group-title {
            font-weight: bold;
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
            border-left: 3px solid #007bff;
            padding-left: 6px;
        }

        /* 細かい設定を1行にまとめるコンテナ */
        .inline-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .inline-controls label {
            font-size: 11px;
            color: #666;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* 入力部品のコンパクト化 */
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        /* 横並び用の小さい入力欄 */
        input.small-input { width: 55px; padding: 4px; text-align: center; }
        select.small-select { width: 75px; padding: 4px; }
        input.color-input { width: 35px; height: 26px; padding: 0; border: none; cursor: pointer; }

        textarea { height: 65px; resize: vertical; margin-top: 5px; }

        /* 保存ボタン */
        .download-btn {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        .download-btn:hover { background-color: #218838; }

        /* カードプレビュー */
        .preview-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-width: 360px;
        }

        /* カード本体 */
        #card {
            width: 350px;
            height: 490px;
            border: 12px solid #333; /* 初期値 */
            box-sizing: border-box;
            position: relative;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* 区画スタイル */
        .section {
            padding: 0 12px;
            width: 100%;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-shadow: 1px 1px 1px #fff, -1px -1px 1px #fff, 1px -1px 1px #fff, -1px 1px 1px #fff;
            
            /* 初期状態の設定 */
            font-size: 18px;
            color: #000000;
            text-align: left;
        }

        .divider {
            width: 100%;
            height: 2px;
            background-color: #333;
            margin: 5px 0;
            flex-shrink: 0;
        }

        #section1 { padding-top: 6px; }
    </style>
</head>
<body>

    <h2 style="margin: 0 0 15px 0; color: #333; font-size: 22px;">高機能カードジェネレーター</h2>

    <div class="container">
        <div class="control-panel">
            
            <div class="control-group">
                <div class="group-title">全体・枠線設定</div>
                <div class="inline-controls">
                    <label>枠色:<input type="color" id="borderColor" class="color-input" value="#333333"></label>
                    <label>枠太さ:<input type="number" id="borderWidth" class="small-input" value="12" min="0">px</label>
                    <select id="bgSelect" style="flex: 1; min-width: 120px;">
                        <option value="">背景なし（白）</option>
                        <option value="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=500">（サンプル）グラデーション</option>
                        <option value="upload">画像をアップロードする</option>
                    </select>
                </div>
                <input type="file" id="imageUpload" accept="image/*" style="display:none; margin-top:5px;">
            </div>

            <div class="control-group">
                <div class="group-title">【区画１】最上部</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" class="size-input small-input" data-target="section1" value="22">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section1" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section1">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text1" placeholder="文字列１">カードのタイトルなど</textarea>
            </div>

            <div class="control-group">
                <div class="group-title">【区画２】中央</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" class="size-input small-input" data-target="section2" value="16">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section2" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section2">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text2" placeholder="文字列２">メインの説明文など。ここに入力した量に合わせて下の線が自動でズレていきます。</textarea>
            </div>

            <div class="control-group">
                <div class="group-title">【区画３】最下部</div>
                <div class="inline-controls">
                    <label>サイズ:<input type="number" class="size-input small-input" data-target="section3" value="14">px</label>
                    <label>色:<input type="color" class="color-picker color-input" data-target="section3" value="#000000"></label>
                    <label>配置:
                        <select class="align-select small-select" data-target="section3">
                            <option value="left" selected>左寄せ</option>
                            <option value="center">中央</option>
                            <option value="right">右寄せ</option>
                        </select>
                    </label>
                </div>
                <textarea id="text3" placeholder="文字列３">フレーバーテキストや注釈など</textarea>
            </div>

            <button class="download-btn" id="downloadBtn">カードを画像として保存</button>
        </div>

        <div class="preview-area">
            <div id="card">
                <div id="section1" class="section" style="font-size: 22px;">カードのタイトルなど</div>
                <div class="divider"></div>
                <div id="section2" class="section" style="font-size: 16px;">メインの説明文など。ここに入力した量に合わせて下の線が自動でズレていきます。</div>
                <div class="divider"></div>
                <div id="section3" class="section" style="font-size: 14px;">フレーバーテキストや注釈など</div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');

        // 文字入力のリアルタイム反映
        ['text1', 'text2', 'text3'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const targetId = id.replace('text', 'section');
                document.getElementById(targetId).textContent = e.target.value;
            });
        });

        // 文字サイズ入力（テキストボックス・数値）の反映
        document.querySelectorAll('.size-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const targetId = e.target.getAttribute('data-target');
                document.getElementById(targetId).style.fontSize = e.target.value + 'px';
            });
        });

        // 文字色選択の反映
        document.querySelectorAll('.color-picker').forEach(picker => {
            picker.addEventListener('input', (e) => {
                const targetId = e.target.getAttribute('data-target');
                document.getElementById(targetId).style.color = e.target.value;
            });
        });

        // 文字配置（左寄せ・中央・右寄せ）の反映
        document.querySelectorAll('.align-select').forEach(select => {
            select.addEventListener('change', (e) => {
                const targetId = e.target.getAttribute('data-target');
                document.getElementById(targetId).style.textAlign = e.target.value;
            });
        });

        // 枠線の色と区切り線の色連動
        document.getElementById('borderColor').addEventListener('input', (e) => {
            card.style.borderColor = e.target.value;
            document.querySelectorAll('.divider').forEach(div => {
                div.style.backgroundColor = e.target.value;
            });
        });

        // 枠線の太さ（数値入力）の反映
        document.getElementById('borderWidth').addEventListener('input', (e) => {
            card.style.borderWidth = e.target.value + 'px';
        });

        // 背景切り替え・アップロード
        const bgSelect = document.getElementById('bgSelect');
        const imageUpload = document.getElementById('imageUpload');
        bgSelect.addEventListener('change', (e) => {
            if (e.target.value === 'upload') {
                imageUpload.style.display = 'block';
            } else {
                imageUpload.style.display = 'none';
                card.style.backgroundImage = e.target.value ? `url('${e.target.value}')` : 'none';
            }
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { card.style.backgroundImage = `url('${ev.target.result}')`; };
                reader.readAsDataURL(file);
            }
        });

        // 画像保存機能
        const downloadBtn = document.getElementById('downloadBtn');
        downloadBtn.addEventListener('click', () => {
            downloadBtn.innerText = "作成中...";
            downloadBtn.disabled = true;

            html2canvas(card, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                downloadBtn.innerText = "カードを画像として保存";
                downloadBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
